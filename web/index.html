<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpotSelf</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <img src="/assets/spotself_logo.svg" alt="SpotSelf">
      </a>
      <nav>
        <a href="/" data-i18n="nav.guest">Guest</a>
        <a href="/admin.html" data-i18n="nav.admin">Admin</a>
      </nav>
      <div class="controls" aria-label="Display controls">
        <button class="small-button" type="button" data-lang="en">EN</button>
        <button class="small-button" type="button" data-lang="tr">TR</button>
        <button class="small-button" id="themeToggle" type="button">Dark</button>
      </div>
    </header>

    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow" data-i18n="guest.eyebrow">Self-hosted event photo delivery</p>
          <h1 data-i18n="guest.title">Find your event photos with one selfie.</h1>
          <p data-i18n="guest.copy">Choose an event, upload a selfie, and SpotSelf returns the best local matches from the event archive.</p>
        </div>
        <div class="status-card">
          <span id="eventCount">0</span>
          <small data-i18n="guest.activeEvents">active events</small>
        </div>
      </section>

      <section class="panel">
        <form id="matchForm" class="form">
          <label>
            <span data-i18n="guest.event">Event</span>
            <select id="eventSelect" required></select>
          </label>
          <label>
            <span data-i18n="guest.selfie">Selfie</span>
            <input id="selfieInput" type="file" name="selfie" accept="image/png,image/jpeg,image/gif" required>
          </label>
          <label>
            <span data-i18n="guest.threshold">Match threshold</span>
            <input id="thresholdInput" type="range" min="0" max="1" step="0.01" value="0.56">
            <span id="thresholdValue">0.56</span>
          </label>
          <button type="submit" data-i18n="guest.submit">Find my photos</button>
        </form>
      </section>

      <section>
        <div class="section-title">
          <h2 data-i18n="guest.matches">Matches</h2>
          <p id="matchStatus" data-i18n="guest.initial">Upload a selfie to begin.</p>
        </div>
        <div id="matches" class="grid"></div>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
